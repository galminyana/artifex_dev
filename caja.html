<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caja — TPV local</title>
<style>
  :root{
    --bg:#181818;
    --panel:#232323;
    --panel-2:#2b2b2b;
    --line:#3a3a3a;
    --text:#f2ede4;
    --muted:#9c9690;
    --accent:#e8a33d;
    --accent-2:#c1443c;
    --ok:#6fae6f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    overflow:hidden;
  }
  #app{display:flex;flex-direction:column;height:100vh;}
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  header h1{font-size:18px;margin:0;letter-spacing:0.5px;font-weight:700;}
  header h1 span{color:var(--accent);}
  .header-btns{display:flex;gap:8px;}
  .icon-btn{
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:9px 14px;font-size:14px;cursor:pointer;
  }
  .icon-btn:active{background:var(--line);}
  main{flex:1;min-height:0;display:flex;overflow:hidden;}
  #products{
    flex:1.4;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:12px;align-content:start;
  }
  .product-btn{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px 12px;text-align:left;cursor:pointer;color:var(--text);
    display:flex;flex-direction:column;gap:6px;min-height:88px;
    justify-content:space-between;
  }
  .product-btn:active{border-color:var(--accent);background:var(--panel-2);}
  .product-name{font-size:15px;font-weight:600;}
  .product-price{font-size:17px;font-weight:800;color:var(--accent);}
  #order-panel{
    flex:1;min-height:0;max-width:360px;min-width:280px;border-left:1px solid var(--line);
    display:flex;flex-direction:column;background:var(--panel);
  }
  #order-lines{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
  .order-line{
    display:flex;align-items:center;gap:8px;padding:10px 6px;
    border-bottom:1px solid var(--line);
  }
  .order-line-name{flex:1;font-size:14px;}
  .order-line-name small{display:block;color:var(--muted);font-size:12px;}
  .qty-controls{display:flex;align-items:center;gap:6px;}
  .qty-btn{
    width:30px;height:30px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--text);font-size:16px;cursor:pointer;
  }
  .qty-val{min-width:22px;text-align:center;font-weight:700;}
  .line-subtotal{width:60px;text-align:right;font-weight:700;font-size:14px;}
  .remove-btn{color:var(--accent-2);background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px;}
  #order-empty{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px;}
  #order-footer{padding:16px;border-top:1px solid var(--line);}
  #total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  #total-row span:first-child{color:var(--muted);font-size:14px;}
  #total-value{font-size:28px;font-weight:800;color:var(--accent);}
  .primary-btn{
    width:100%;padding:16px;border:none;border-radius:12px;background:var(--accent-2);
    color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px;
  }
  .primary-btn:active{opacity:0.85;}
  .secondary-btn{
    width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;
    background:transparent;color:var(--muted);font-size:14px;cursor:pointer;
  }
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;
    align-items:center;justify-content:center;z-index:10;padding:20px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    max-width:480px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;
  }
  .modal h2{margin-top:0;font-size:17px;}
  .modal textarea{
    width:100%;min-height:100px;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:10px;font-family:monospace;
    font-size:13px;resize:vertical;
  }
  .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  .file-row{margin:12px 0;}
  input[type=file]{color:var(--text);font-size:13px;}
  .sale-item{border-bottom:1px solid var(--line);padding:10px 0;}
  .sale-item .sale-head{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);}
  .sale-item .sale-total{font-weight:700;color:var(--accent);font-size:15px;}
  .sale-lines{margin-top:6px;font-size:13px;color:var(--muted);}
  #history-summary{
    display:flex;justify-content:space-between;padding:10px 0;
    border-bottom:2px solid var(--line);margin-bottom:8px;font-weight:700;
  }
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ok);color:#0a0a0a;padding:12px 22px;border-radius:10px;
    font-weight:700;font-size:14px;z-index:20;opacity:0;transition:opacity 0.3s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
  #pay-total-row, #pay-received-row, #pay-change-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;color:var(--muted);
  }
  #pay-total-value, #pay-received-value{font-size:18px;font-weight:700;color:var(--text);}
  #pay-change-row{border-bottom:none;margin-bottom:4px;}
  #pay-change-value{font-size:24px;font-weight:800;color:var(--ok);}
  #pay-change-row.short #pay-change-value{color:var(--accent-2);}
  #pay-change-row.short #pay-change-label::after{content:" (falta)";font-size:11px;}
  #bills-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;
  }
  .bill-btn{
    padding:14px 6px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--text);font-size:15px;font-weight:700;
    cursor:pointer;
  }
  .bill-btn:active{border-color:var(--accent);}
  .custom-amount-row{display:flex;gap:8px;margin-top:12px;}
  .custom-amount-row input{
    flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:10px;font-size:14px;
  }
  #confirm-payment-btn:disabled{opacity:0.4;cursor:not-allowed;}
  @media (max-width:640px){
    main{flex-direction:column;}
    #order-panel{max-width:none;min-width:0;border-left:none;border-top:1px solid var(--line);max-height:45vh;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Caja<span>_</span></h1>
    <div class="header-btns">
      <button class="icon-btn" onclick="openModal('history-modal')">Ventas</button>
      <button class="icon-btn" onclick="openModal('products-modal')">Productos</button>
    </div>
  </header>
  <main>
    <div id="products"></div>
    <div id="order-panel">
      <div id="order-lines"></div>
      <div id="order-footer">
        <div id="total-row">
          <span>TOTAL</span>
          <span id="total-value">0,00 €</span>
        </div>
        <button class="primary-btn" onclick="openPaymentModal()">Cobrar</button>
        <button class="secondary-btn" onclick="clearOrder()">Vaciar pedido</button>
      </div>
    </div>
  </main>
</div>

<!-- Products modal -->
<div class="overlay" id="products-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('products-modal')">✕</button>
    <h2>Lista de productos</h2>
    <p style="color:var(--muted);font-size:13px;">Formato: <code>producto;precio</code> una línea por producto.</p>
    <textarea id="products-textarea"></textarea>
    <button class="icon-btn" style="width:100%;margin-top:8px;" onclick="updateProductsFromTextarea()">Actualizar lista</button>
    <div class="file-row">
      <label style="font-size:13px;color:var(--muted);">O cargar archivo .csv:</label><br>
      <input type="file" id="csv-file-input" accept=".csv,text/csv" onchange="handleCSVFile(event)">
    </div>
  </div>
</div>

<!-- History modal -->
<div class="overlay" id="history-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('history-modal')">✕</button>
    <h2>Historial de ventas</h2>
    <div id="history-summary"></div>
    <div id="history-list"></div>
    <button class="icon-btn" style="width:100%;margin-top:12px;" onclick="exportHistoryCSV()">Exportar CSV</button>
    <button class="secondary-btn" style="margin-top:8px;" onclick="confirmClearHistory()">Borrar historial</button>
  </div>
</div>

<!-- Payment modal -->
<div class="overlay" id="payment-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('payment-modal')">✕</button>
    <h2>Cobro</h2>
    <div id="pay-total-row">
      <span>Total a cobrar</span>
      <span id="pay-total-value">0,00 €</span>
    </div>
    <div id="pay-received-row">
      <span>Entregado</span>
      <span id="pay-received-value">0,00 €</span>
    </div>
    <div id="pay-change-row">
      <span id="pay-change-label">Cambio</span>
      <span id="pay-change-value">0,00 €</span>
    </div>
    <p style="color:var(--muted);font-size:12px;margin:14px 0 6px;">Toca los billetes/monedas que entrega el cliente:</p>
    <div id="bills-grid"></div>
    <div class="custom-amount-row">
      <input type="number" step="0.01" min="0" id="custom-amount-input" placeholder="Otra cantidad">
      <button class="icon-btn" onclick="addCustomAmount()">Añadir</button>
    </div>
    <button class="secondary-btn" style="margin-top:8px;" onclick="resetPayment()">Borrar entregado</button>
    <button class="primary-btn" id="confirm-payment-btn" style="margin-top:14px;" onclick="confirmPayment()" disabled>Confirmar cobro</button>
    <button class="icon-btn" style="width:100%;" onclick="confirmExactPayment()">Pago exacto / Tarjeta</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_CSV = `Frankfurt;5,50
Cola;3,20
Fritas;1.35
Burguer;4,3
Naranjada;3,10
Café;1,50
Bocadillo jamón;12,30
Agua;2,00
Café con leche;2,00
Bocadillo queso;3,00
Bocadillo fuet;3,00
Sandwich;4,00`;

let products = [];
let currentOrder = []; // {name, price, qty}
let sales = [];
let paymentReceived = 0;
const BILLS = [5, 10, 20, 50, 100, 200, 500];

function parseCSV(text){
  return text.split(/\r?\n/)
    .map(l=>l.trim())
    .filter(l=>l.length>0)
    .map(line=>{
      const parts = line.split(';');
      const name = (parts[0]||'').trim();
      const priceStr = (parts[1]||'0').trim().replace(',', '.');
      const price = parseFloat(priceStr) || 0;
      return {name, price};
    })
    .filter(p=>p.name.length>0);
}

function formatPrice(n){
  return n.toFixed(2).replace('.', ',') + ' €';
}

function saveProducts(){
  localStorage.setItem('pos_products', JSON.stringify(products));
}
function saveOrder(){
  localStorage.setItem('pos_current_order', JSON.stringify(currentOrder));
}
function saveSales(){
  localStorage.setItem('pos_sales', JSON.stringify(sales));
}

function loadAll(){
  const p = localStorage.getItem('pos_products');
  products = p ? JSON.parse(p) : parseCSV(DEFAULT_CSV);
  const o = localStorage.getItem('pos_current_order');
  currentOrder = o ? JSON.parse(o) : [];
  const s = localStorage.getItem('pos_sales');
  sales = s ? JSON.parse(s) : [];
}

function renderProducts(){
  const el = document.getElementById('products');
  el.innerHTML = '';
  products.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'product-btn';
    btn.innerHTML = `<span class="product-name">${escapeHTML(p.name)}</span><span class="product-price">${formatPrice(p.price)}</span>`;
    btn.onclick = ()=>addToOrder(p);
    el.appendChild(btn);
  });
}

function escapeHTML(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function addToOrder(product){
  const existing = currentOrder.find(l=>l.name===product.name && l.price===product.price);
  if(existing){
    existing.qty += 1;
  } else {
    currentOrder.push({name:product.name, price:product.price, qty:1});
  }
  saveOrder();
  renderOrder();
}

function changeQty(index, delta){
  const line = currentOrder[index];
  if(!line) return;
  line.qty += delta;
  if(line.qty <= 0){
    currentOrder.splice(index,1);
  }
  saveOrder();
  renderOrder();
}

function removeLine(index){
  currentOrder.splice(index,1);
  saveOrder();
  renderOrder();
}

function clearOrder(){
  if(currentOrder.length===0) return;
  if(!confirm('¿Vaciar el pedido actual?')) return;
  currentOrder = [];
  saveOrder();
  renderOrder();
}

function orderTotal(){
  return currentOrder.reduce((sum,l)=>sum + l.price*l.qty, 0);
}

function renderOrder(){
  const el = document.getElementById('order-lines');
  if(currentOrder.length===0){
    el.innerHTML = '<div id="order-empty">Toca un producto para añadirlo al pedido</div>';
  } else {
    el.innerHTML = '';
    currentOrder.forEach((l, i)=>{
      const row = document.createElement('div');
      row.className = 'order-line';
      row.innerHTML = `
        <div class="order-line-name">${escapeHTML(l.name)}<small>${formatPrice(l.price)} / ud</small></div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-val">${l.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div class="line-subtotal">${formatPrice(l.price*l.qty)}</div>
        <button class="remove-btn" onclick="removeLine(${i})">🗑</button>
      `;
      el.appendChild(row);
    });
  }
  document.getElementById('total-value').textContent = formatPrice(orderTotal());
}

function round2(n){
  return Math.round((n + Number.EPSILON) * 100) / 100;
}

function openPaymentModal(){
  if(currentOrder.length===0){
    showToast('El pedido está vacío');
    return;
  }
  paymentReceived = 0;
  renderBillsGrid();
  renderPaymentModal();
  document.getElementById('payment-modal').classList.add('open');
}

function renderBillsGrid(){
  const grid = document.getElementById('bills-grid');
  grid.innerHTML = '';
  BILLS.forEach(v=>{
    const btn = document.createElement('button');
    btn.className = 'bill-btn';
    btn.textContent = v + ' €';
    btn.onclick = ()=>addBillAmount(v);
    grid.appendChild(btn);
  });
}

function addBillAmount(v){
  paymentReceived = round2(paymentReceived + v);
  renderPaymentModal();
}

function addCustomAmount(){
  const input = document.getElementById('custom-amount-input');
  const val = parseFloat((input.value || '0').replace(',', '.'));
  if(!isNaN(val) && val > 0){
    paymentReceived = round2(paymentReceived + val);
  }
  input.value = '';
  renderPaymentModal();
}

function resetPayment(){
  paymentReceived = 0;
  renderPaymentModal();
}

function renderPaymentModal(){
  const total = orderTotal();
  const change = round2(paymentReceived - total);
  document.getElementById('pay-total-value').textContent = formatPrice(total);
  document.getElementById('pay-received-value').textContent = formatPrice(paymentReceived);
  const changeRow = document.getElementById('pay-change-row');
  const changeLabel = document.getElementById('pay-change-label');
  const changeValue = document.getElementById('pay-change-value');
  const confirmBtn = document.getElementById('confirm-payment-btn');
  if(change < 0){
    changeRow.classList.add('short');
    changeLabel.textContent = 'Falta';
    changeValue.textContent = formatPrice(Math.abs(change));
    confirmBtn.disabled = true;
  } else {
    changeRow.classList.remove('short');
    changeLabel.textContent = 'Cambio a devolver';
    changeValue.textContent = formatPrice(change);
    confirmBtn.disabled = false;
  }
}

function confirmExactPayment(){
  paymentReceived = orderTotal();
  finalizeCheckout();
}

function confirmPayment(){
  if(round2(paymentReceived - orderTotal()) < 0) return;
  finalizeCheckout();
}

function finalizeCheckout(){
  const total = orderTotal();
  const change = round2(paymentReceived - total);
  const sale = {
    id: Date.now(),
    timestamp: new Date().toISOString(),
    lines: currentOrder.map(l=>({...l})),
    total: total,
    received: paymentReceived,
    change: change
  };
  sales.unshift(sale);
  saveSales();
  currentOrder = [];
  saveOrder();
  renderOrder();
  closeModal('payment-modal');
  showToast('Venta registrada · Cambio: ' + formatPrice(change));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function openModal(id){
  if(id==='products-modal'){
    document.getElementById('products-textarea').value =
      products.map(p=>`${p.name};${String(p.price).replace('.', ',')}`).join('\n');
  }
  if(id==='history-modal'){
    renderHistory();
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

function updateProductsFromTextarea(){
  const text = document.getElementById('products-textarea').value;
  const parsed = parseCSV(text);
  if(parsed.length===0){
    showToast('No se han encontrado productos válidos');
    return;
  }
  products = parsed;
  saveProducts();
  renderProducts();
  closeModal('products-modal');
  showToast('Lista de productos actualizada');
}

function handleCSVFile(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('products-textarea').value = e.target.result;
  };
  reader.readAsText(file);
}

function renderHistory(){
  const listEl = document.getElementById('history-list');
  const summaryEl = document.getElementById('history-summary');
  const totalRevenue = sales.reduce((s,sale)=>s+sale.total,0);
  summaryEl.innerHTML = `<span>${sales.length} venta(s)</span><span>${formatPrice(totalRevenue)}</span>`;
  if(sales.length===0){
    listEl.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">Sin ventas registradas todavía</div>';
    return;
  }
  listEl.innerHTML = sales.map(sale=>{
    const d = new Date(sale.timestamp);
    const dateStr = d.toLocaleDateString('es-ES') + ' ' + d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    const linesStr = sale.lines.map(l=>`${l.qty}× ${escapeHTML(l.name)}`).join(', ');
    const payStr = (sale.received!==undefined)
      ? `Entregado ${formatPrice(sale.received)} · Cambio ${formatPrice(sale.change)}`
      : '';
    return `<div class="sale-item">
      <div class="sale-head"><span>${dateStr}</span><span class="sale-total">${formatPrice(sale.total)}</span></div>
      <div class="sale-lines">${linesStr}</div>
      <div class="sale-lines">${payStr}</div>
    </div>`;
  }).join('');
}

function confirmClearHistory(){
  if(sales.length===0) return;
  if(!confirm('¿Borrar todo el historial de ventas? Esta acción no se puede deshacer.')) return;
  sales = [];
  saveSales();
  renderHistory();
  showToast('Historial borrado');
}

function exportHistoryCSV(){
  if(sales.length===0){
    showToast('No hay ventas que exportar');
    return;
  }
  let csv = 'fecha_hora;producto;cantidad;precio_unidad;subtotal;total_venta;entregado;cambio;id_venta\n';
  sales.slice().reverse().forEach(sale=>{
    const dateStr = new Date(sale.timestamp).toLocaleString('es-ES');
    const receivedStr = sale.received!==undefined ? String(sale.received.toFixed(2)).replace('.', ',') : '';
    const changeStr = sale.change!==undefined ? String(sale.change.toFixed(2)).replace('.', ',') : '';
    sale.lines.forEach(l=>{
      csv += `${dateStr};${l.name};${l.qty};${String(l.price).replace('.', ',')};${String((l.price*l.qty).toFixed(2)).replace('.', ',')};${String(sale.total.toFixed(2)).replace('.', ',')};${receivedStr};${changeStr};${sale.id}\n`;
    });
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'historial_ventas_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click', (e)=>{
    if(e.target === ov) ov.classList.remove('open');
  });
});

loadAll();
renderProducts();
renderOrder();
</script>
</body>
</html>
